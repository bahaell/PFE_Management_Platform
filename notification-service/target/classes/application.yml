server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: 200104ba++
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # ⚡ Fail-safe: service still starts even if RabbitMQ is down
    connection-timeout: 5000
    listener:
      simple:
        # Don't crash if queues are missing (RabbitMQ not running)
        missing-queues-fatal: false
        # Don't auto-start consumers — events still work when RabbitMQ comes up
        auto-startup: false
        retry:
          enabled: true
          initial-interval: 5000  # wait 5s before first retry
          max-attempts: 3
          multiplier: 2.0
          max-interval: 30000     # max 30s between retries

# ─── RabbitMQ logical config ───────────────────────────────────────────────
rabbitmq:
  exchange: pfe.events.exchange
  queue:
    # Commit
    notification: notification.queue
    # Subject
    subject: subject.application.created.queue
    subject-updated: subject.application.updated.queue
    # Project
    project: project.created.queue
    # Message
    message: message.sent.queue
    # Task
    task-assigned: task.assigned.queue
    task-updated: task.updated.queue
    # Document
    document-uploaded: document.uploaded.queue
    doc-generated: academic.document.generated.queue
    doc-requested: academic.document.requested.queue
    # Defense
    defense-request: defense.request.created.queue
    defense-scheduled: defense.scheduled.queue
    jury: jury.assigned.queue
    # System
    user: user.created.queue
    deadline: deadline.reminder.queue
    # Dead Letter Queue
    dlq: notification.queue.dlq
  routing-key:
    commit-created: commit.created

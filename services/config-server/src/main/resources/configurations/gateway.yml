server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: user-service-auth
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**
            - id: user-service-users
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: projects-service-projects
              uri: lb://projects-service
              predicates:
                - Path=/api/projects/**
            - id: projects-service-tasks
              uri: lb://projects-service
              predicates:
                - Path=/api/tasks/**
            - id: projects-service-documents
              uri: lb://projects-service
              predicates:
                - Path=/api/documents/**
            - id: projects-service-comments
              uri: lb://projects-service
              predicates:
                - Path=/api/comments/**

management:
  endpoint:
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: gateway,health,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
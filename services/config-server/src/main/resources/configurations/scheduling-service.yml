server:
  port: 8087

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/scheduling_db
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

services:
  resource:
    url: http://localhost:8086
  projects:
    url: http://localhost:8083

timefold:
  solver:
    termination:
      spent-limit: 30s
server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: projects-service-projects
          uri: lb://projects-service
          predicates:
            - Path=/api/projects/**
        - id: projects-service-subjects
          uri: lb://projects-service
          predicates:
            - Path=/api/subjects/**
        - id: projects-service-free-subjects
          uri: lb://projects-service
          predicates:
            - Path=/api/free-subjects/**
        - id: projects-service-tasks
          uri: lb://projects-service
          predicates:
            - Path=/api/tasks/**
        - id: projects-service-companies
          uri: lb://projects-service
          predicates:
            - Path=/api/companies/**
        - id: resource-service-rooms
          uri: lb://resource-service
          predicates:
            - Path=/api/rooms/**
        - id: scheduling-service
          uri: lb://scheduling-service
          predicates:
            - Path=/api/schedule/**
        - id: ai-service-recommendations
          uri: lb://ai-service
          predicates:
            - Path=/api/recommendations/**
        - id: notification-service-notifications
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: notification-service-devices
          uri: lb://notification-service
          predicates:
            - Path=/api/devices/**

management:
  endpoint:
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: gateway,health,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

server:
  port: 8082

spring:
  application:
    name: user-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/user_service_db
    username: postgres
    password: 200104ba++
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

jwt:
  secret: aVeryLongSecretKeyThatNeedsToBeAtLeast256BitsSoThatItWorksWithHmacSha256
  expiration-ms: 86400000

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
